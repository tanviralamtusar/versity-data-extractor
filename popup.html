<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Data Extractor</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📊 Student Data Extractor</h1>
    </div>

    <div id="status" class="status"></div>

    <div class="controls">
      <button id="actionBtn" class="btn btn-primary">📥 Grab & Send Data</button>
      <label for="webhookRoute">Webhook Route: </label>
      <select id="webhookRoute">
        <option value="cse">CSE</option>
        <option value="bba">BBA</option>
      </select>
    </div>

    <button id="floatingSendBtn" class="floating-btn">Send</button>

    <div id="dataDisplay" class="data-display"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
